<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rohith Sunil — UI/UX Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F7F6F2;
      --ink: #111110;
      --mid: #6B6B63;
      --accent: #2A52E0;
      --rule: #DDDDD8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(24px, 5vw, 56px) clamp(24px, 8vw, 96px);
      gap: 0;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--rule);
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .logo span {
      color: var(--accent);
    }

    nav {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--mid);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(48px, 8vh, 96px) 0;
      gap: 40px;
      max-width: 820px;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 300;
      color: var(--mid);
      line-height: 1.65;
      max-width: 480px;
    }

    /* ── CTA ── */
    .cta-row {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 16px 28px;
      border-radius: 4px;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }

    .btn-primary svg {
      transition: transform 0.2s;
    }

    .btn-primary:hover svg {
      transform: translateX(3px);
    }

    .btn-note {
      font-size: 0.78rem;
      color: var(--mid);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--rule);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.75rem;
      color: var(--mid);
    }

    footer a {
      color: var(--mid);
      text-decoration: none;
    }

    footer a:hover { color: var(--ink); }

    /* ── Signature mark ── */
    .mark {
      position: fixed;
      bottom: clamp(24px, 5vw, 48px);
      right: clamp(24px, 5vw, 56px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--ink);
      background: var(--bg);
      pointer-events: none;
      opacity: 0.5;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .cta-row { flex-direction: column; align-items: flex-start; }
      footer { flex-direction: column; }
      .mark { display: none; }
    }

    /* ── Fade in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow { animation: fadeUp 0.5s ease both; }
    h1       { animation: fadeUp 0.5s 0.1s ease both; }
    .subtitle{ animation: fadeUp 0.5s 0.2s ease both; }
    .cta-row { animation: fadeUp 0.5s 0.3s ease both; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="logo">Rohith<span>.</span></div>
      <nav>UI/UX Designer · 2026</nav>
    </header>

    <main class="hero">
      <p class="eyebrow">Portfolio</p>
      <h1>Designed with<br><em>intention.</em></h1>
      <p class="subtitle">
        Some designers pick a lane. I design across all of them — interfaces, motion, and visuals that tell a story.
      </p>
      <div class="cta-row">
        <a class="btn-primary" href="RohithSunil Portfolio.pdf" target="_blank">
          View Portfolio
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <span class="btn-note">Opens as PDF</span>
      </div>
    </main>

    <footer>
      <span>© 2026 Rohith Sunil</span>
      <span>rohiths.com</span>
    </footer>

  </div>

  <div class="mark" aria-hidden="true">R</div>
</body>
</html>
